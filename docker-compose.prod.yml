# Production: one public URL (port 80) — UI + API + Qdrant
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   Open http://YOUR_SERVER_IP

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      LLM_PROVIDER: extractive
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: pdf_documents
      API_HOST: 0.0.0.0
      API_PORT: 8000
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      CORS_ORIGINS: '["*"]'
    volumes:
      - upload_data:/app/uploads
    depends_on:
      - qdrant
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_APP_TITLE: PDF Chatbot
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app

volumes:
  qdrant_storage:
  upload_data:

networks:
  app:
    driver: bridge
