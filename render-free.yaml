# FREE Render deploy — one service only (no credit card for free tier)
# Uses local Qdrant on disk inside the API container (demo OK; data may reset on redeploy)
#
# Deploy: Render Dashboard → New → Blueprint → this file
# OR: New → Web Service → Docker → backend/Dockerfile

services:
  - type: web
    name: pdf-chatbot-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: LLM_PROVIDER
        value: extractive
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: QDRANT_URL
        value: http://localhost:6333
      - key: QDRANT_COLLECTION_NAME
        value: pdf_documents
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: '["*"]'
